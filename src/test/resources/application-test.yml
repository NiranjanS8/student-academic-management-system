spring:
  datasource:
    url: jdbc:h2:mem:sams-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
  flyway:
    enabled: false

security:
  jwt:
    secret: test-secret-key-with-at-least-32-bytes-long-value
    access-token-expiration-minutes: 60
    refresh-token-expiration-days: 7

sams:
  scheduler:
    attendance-shortage:
      cron: "0 0 8 * * *"
      minimum-percentage: 75
    fee-reminder:
      cron: "0 0 9 * * *"
      upcoming-days: 3
    notification-cleanup:
      cron: "0 0 3 * * *"
      retention-days: 30
    result-reminder:
      cron: "0 30 9 * * *"
      delay-days: 0
