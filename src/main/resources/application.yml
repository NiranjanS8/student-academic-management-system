spring:
  application:
    name: student-academic-management-system
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:9090}

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.flywaydb: info

sams:
  scheduler:
    attendance-shortage:
      cron: ${ATTENDANCE_SHORTAGE_CRON:0 0 8 * * *}
      minimum-percentage: ${ATTENDANCE_SHORTAGE_MINIMUM_PERCENTAGE:75}
    fee-reminder:
      cron: ${FEE_REMINDER_CRON:0 0 9 * * *}
      upcoming-days: ${FEE_REMINDER_UPCOMING_DAYS:3}
    result-reminder:
      cron: ${RESULT_REMINDER_CRON:0 30 9 * * *}
      delay-days: ${RESULT_REMINDER_DELAY_DAYS:1}
